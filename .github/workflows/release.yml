name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p ci-temp "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p ci-temp "$KC"
          echo "$MACOS_CERT_P12" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k ci-temp "$KC" >/dev/null
          security list-keychains -d user -s "$KC" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"
          security find-identity -v -p codesigning "$KC"

      - name: Build, sign, notarize, staple (app + dmg) & appcast
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: bash Scripts/release.sh "${{ steps.ver.outputs.version }}"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Cachesweep ${{ steps.ver.outputs.version }}
          files: |
            dist/Cachesweep-${{ steps.ver.outputs.version }}.zip
            dist/Cachesweep-${{ steps.ver.outputs.version }}.dmg
            dist/appcast.xml
